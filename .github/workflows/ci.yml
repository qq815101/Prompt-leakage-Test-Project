name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Unit tests
        run: |
            export PYTHONPATH=$PWD   
            pytest -q

      - name: Run smoke suite (API)
        run: |
          python scripts/run_suite.py --suite data/suites/smoke.json --out artifacts/smoke.jsonl
          python src/report.py --in artifacts/smoke.jsonl --out artifacts/report.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: artifacts/