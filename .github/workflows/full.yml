name: Full Suite (Manual)

on:
  workflow_dispatch:

jobs:
  run-full:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate full suite
        run: |
          python scripts/generate_full_suite.py

      - name: Run full suite
        run: |
          mkdir -p artifacts
          python scripts/run_suite.py --suite data/suites/full.json --out artifacts/full.jsonl
          python -m src.report --in artifacts/full.jsonl --out artifacts/full_report.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-results
          path: artifacts/